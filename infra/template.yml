AWSTemplateFormatVersion: '2010-09-09'
Description: Static website hosting with S3 and CloudFront for chess-app

Parameters:
  Name:
    Type: String
    Default: chess
    Description: The root name of the AWS resources 

  DomainName:
    Type: String
    Description: The domain name for the website

  CertificateArn:
    Type: String
    Description: ARN of the ACM certificate for the domain (must be in us-east-1)

  SiteDomain:
    Type: String
    Description: Full domain for the site (e.g., chesstard.biz or develop.chesstard.biz)

  Environment:
    Type: String
    Default: dev
    Description: Environment name for resource naming

  RedirectDomain:
    Type: String
    Default: ''
    Description: Optional domain to redirect to SiteDomain (e.g., dev.chesstard.biz)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID

Conditions:
  HasRedirectDomain: !Not [!Equals [!Ref RedirectDomain, '']]

Resources:
  # S3 Bucket for static website hosting (private, accessed via CloudFront only)
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub cta-${Environment}-${Name}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudFront Origin Access Control
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${Environment}-${Name}-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function to redirect old domain to new domain
  RedirectFunction:
    Type: AWS::CloudFront::Function
    Condition: HasRedirectDomain
    Properties:
      Name: !Sub ${Environment}-${Name}-redirect
      AutoPublish: true
      FunctionConfig:
        Comment: !Sub 'Redirect ${RedirectDomain} to ${SiteDomain}'
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        function handler(event) {
          var request = event.request;
          var host = request.headers.host.value;
          if (host === '${RedirectDomain}') {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: {
                location: { value: 'https://${SiteDomain}' + request.uri }
              }
            };
          }
          return request;
        }

  # CloudFront Distribution
  WebsiteCloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        Aliases:
          !If
            - HasRedirectDomain
            - - !Ref SiteDomain
              - !Ref RedirectDomain
            - - !Ref SiteDomain
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
          ResponseHeadersPolicyId: 5cc3b908-e619-4b99-88e5-2cf7f45965bd  # CORS-With-Preflight
          FunctionAssociations:
            !If
              - HasRedirectDomain
              - - EventType: viewer-request
                  FunctionARN: !GetAtt RedirectFunction.FunctionARN
              - !Ref AWS::NoValue
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        PriceClass: PriceClass_100

  # S3 Bucket Policy to allow CloudFront OAC access
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${WebsiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${WebsiteCloudFront}

  # S3 Bucket for article content and images
  ArticlesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub cta-${Environment}-articles
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
            AllowedOrigins:
              - "*"
            MaxAge: 300

  # Public read policy for article images
  ArticlesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArticlesBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadArticleImages
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub ${ArticlesBucket.Arn}/articles/*/images/*

  # Cognito User Pool
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${Environment}-${Name}-users
      AutoVerifiedAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  # Cognito User Pool Client
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${Environment}-${Name}-web
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED

  # Route53 DNS Record - Points site to CloudFront
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref SiteDomain
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (constant for all CloudFront distributions)
        DNSName: !GetAtt WebsiteCloudFront.DomainName
        EvaluateTargetHealth: false

  # Route53 DNS Record for redirect domain (optional)
  RedirectDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasRedirectDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref RedirectDomain
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt WebsiteCloudFront.DomainName
        EvaluateTargetHealth: false

Outputs:
  WebsiteBucketName:
    Description: Name of the S3 bucket
    Value: !Ref WebsiteBucket
    Export:
      Name: !Sub ${AWS::StackName}-BucketName

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref WebsiteCloudFront
    Export:
      Name: !Sub ${AWS::StackName}-DistributionId

  CloudFrontDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt WebsiteCloudFront.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-DistributionDomain

  WebsiteURL:
    Description: Website URL
    Value: !Sub https://${SiteDomain}
    Export:
      Name: !Sub ${AWS::StackName}-WebsiteURL

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolClientId

  CognitoRegion:
    Description: Cognito Region
    Value: !Ref AWS::Region
    Export:
      Name: !Sub ${AWS::StackName}-CognitoRegion

  ArticlesBucketName:
    Description: Name of the articles S3 bucket
    Value: !Ref ArticlesBucket
    Export:
      Name: !Sub ${AWS::StackName}-ArticlesBucketName

  ArticlesBucketArn:
    Description: ARN of the articles S3 bucket
    Value: !GetAtt ArticlesBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ArticlesBucketArn