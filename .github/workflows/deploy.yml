name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - Deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::578613961467:role/chesstard-github-actions-deploy
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check and delete stack if in rollback state
        run: |
          STACK_NAME=chesstard-app-stack

          # Check if stack exists
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Current stack status: $STACK_STATUS"

          # Delete stack if in rollback or delete failed state
          if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" ]] || \
             [[ "$STACK_STATUS" == "ROLLBACK_FAILED" ]] || \
             [[ "$STACK_STATUS" == "UPDATE_ROLLBACK_COMPLETE" ]] || \
             [[ "$STACK_STATUS" == "UPDATE_ROLLBACK_FAILED" ]] || \
             [[ "$STACK_STATUS" == "DELETE_FAILED" ]]; then

            echo "Stack is in failed state. Attempting to clean up resources..."

            # Try to get bucket name from stack outputs or resources
            BUCKET_NAME=$(aws cloudformation describe-stack-resources \
              --stack-name $STACK_NAME \
              --query "StackResources[?ResourceType=='AWS::S3::Bucket'].PhysicalResourceId" \
              --output text 2>/dev/null || echo "")

            # If bucket exists, empty it
            if [ ! -z "$BUCKET_NAME" ]; then
              echo "Found S3 bucket: $BUCKET_NAME"
              echo "Emptying S3 bucket..."
              aws s3 rm s3://$BUCKET_NAME --recursive 2>/dev/null || echo "Bucket already empty or doesn't exist"
            fi

            # Try to clean up orphaned CloudFront OAC
            echo "Cleaning up orphaned Origin Access Controls..."
            OAC_ID=$(aws cloudfront list-origin-access-controls \
              --query "OriginAccessControlList.Items[?Name=='dev.chesstard.biz-OAC'].Id" \
              --output text 2>/dev/null || echo "")

            if [ ! -z "$OAC_ID" ]; then
              echo "Found orphaned OAC: $OAC_ID. Attempting to delete..."
              OAC_ETAG=$(aws cloudfront get-origin-access-control \
                --id $OAC_ID \
                --query "ETag" \
                --output text 2>/dev/null || echo "")

              if [ ! -z "$OAC_ETAG" ]; then
                aws cloudfront delete-origin-access-control \
                  --id $OAC_ID \
                  --if-match $OAC_ETAG 2>/dev/null || echo "Could not delete OAC (may be in use)"
              fi
            fi

            echo "Deleting stack..."
            aws cloudformation delete-stack --stack-name $STACK_NAME

            echo "Waiting for stack deletion to complete..."
            # Wait with timeout
            for i in {1..30}; do
              STACK_STATUS=$(aws cloudformation describe-stacks \
                --stack-name $STACK_NAME \
                --query "Stacks[0].StackStatus" \
                --output text 2>/dev/null || echo "DELETED")

              echo "Current status: $STACK_STATUS (attempt $i/30)"

              if [[ "$STACK_STATUS" == "DELETED" ]]; then
                echo "Stack deleted successfully"
                break
              elif [[ "$STACK_STATUS" == "DELETE_FAILED" ]]; then
                echo "Stack deletion failed again. Continuing anyway - CloudFormation deploy will handle updates."
                break
              fi

              sleep 10
            done

          elif [[ "$STACK_STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Stack does not exist. Will create new stack."
          else
            echo "Stack exists with status: $STACK_STATUS. Will attempt to update."
          fi

      - name: Deploy CloudFormation Stack
        id: cfn-deploy
        run: |
          # Check if certificate exists and get ARN
          CERT_ARN=$(aws acm list-certificates --region us-east-1 --query "CertificateSummaryList[?DomainName=='dev.chesstard.biz'].CertificateArn" --output text)

          if [ -z "$CERT_ARN" ]; then
            echo "Error: No ACM certificate found for dev.chesstard.biz in us-east-1"
            echo "Please create a certificate in ACM for dev.chesstard.biz before deploying"
            exit 1
          fi

          echo "Using certificate: $CERT_ARN"

          aws cloudformation deploy \
            --template-file infra/template.yml \
            --stack-name chesstard-app-stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DomainName=dev.chesstard.biz \
              CertificateArn=$CERT_ARN \
              Environment=prod

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name chesstard-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name chesstard-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # Upload index.html separately with shorter cache
          aws s3 cp dist/index.html s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output Website URL
        run: |
          echo "🚀 Deployment complete!"
          echo "Website URL: https://dev.chesstard.biz"
