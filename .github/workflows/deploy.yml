name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - Deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::578613961467:role/chesstard-github-actions-deploy
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy CloudFormation Stack
        id: cfn-deploy
        run: |
          # Check if certificate exists and get ARN
          CERT_ARN=$(aws acm list-certificates --region us-east-1 --query "CertificateSummaryList[?DomainName=='chesstard.biz'].CertificateArn" --output text)

          if [ -z "$CERT_ARN" ]; then
            echo "Error: No ACM certificate found for chesstard.biz in us-east-1"
            echo "Please create a certificate in ACM for chesstard.biz before deploying"
            exit 1
          fi

          echo "Using certificate: $CERT_ARN"

          aws cloudformation deploy \
            --template-file infra/template.yml \
            --stack-name chesstard-app-stack \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              DomainName=chesstard.biz \
              CertificateArn=$CERT_ARN \
              Environment=prod

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name chesstard-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name chesstard-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # Upload index.html separately with shorter cache
          aws s3 cp dist/index.html s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output Website URL
        run: |
          echo "🚀 Deployment complete!"
          echo "Website URL: https://chesstard.biz"
