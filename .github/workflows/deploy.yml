name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - bouncychess

env:
  ENVIRONMENT: dev
  NAME: bouncychess
  DOMAIN: bouncychess.com
  NODE_ENV: staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::578613961467:role/chess-github-actions-deploy
          aws-region: us-east-1

      - name: Deploy CloudFormation Stack
        id: cfn-deploy
        run: |
          # Check if certificate exists and get ARN
          CERT_ARN=$(aws acm list-certificates --region us-east-1 --query "CertificateSummaryList[?DomainName=='${{ env.DOMAIN }}'].CertificateArn" --output text)

          if [ -z "$CERT_ARN" ]; then
            echo "Error: No ACM certificate found for ${{ env.DOMAIN }} in us-east-1"
            echo "Please create a certificate in ACM for ${{ env.DOMAIN }} before deploying"
            exit 1
          fi

          echo "Using certificate: $CERT_ARN"

          # Get the hosted zone ID for DOMAIN
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ env.DOMAIN }}.'].Id" \
            --output text | cut -d'/' -f3)

          if [ -z "$HOSTED_ZONE_ID" ]; then
            echo "Error: No Route53 hosted zone found for ${{ env.DOMAIN }}"
            exit 1
          fi

          echo "Using hosted zone: $HOSTED_ZONE_ID"

          aws cloudformation deploy \
            --template-file infra/template.yml \
            --stack-name bouncychess-app-stack \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Name=${{ env.NAME }} \
              DomainName=${{ env.DOMAIN }} \
              CertificateArn=$CERT_ARN \
              Environment=${{ env.ENVIRONMENT }} \
              HostedZoneId=$HOSTED_ZONE_ID

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name bouncychess-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue" \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name bouncychess-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)

          COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name bouncychess-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolId'].OutputValue" \
            --output text)

          COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name bouncychess-app-stack \
            --query "Stacks[0].Outputs[?OutputKey=='CognitoUserPoolClientId'].OutputValue" \
            --output text)

          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: ${{ env.NODE_ENV }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.stack-outputs.outputs.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.stack-outputs.outputs.COGNITO_CLIENT_ID }}

      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # Upload index.html separately with shorter cache
          aws s3 cp dist/index.html s3://${{ steps.stack-outputs.outputs.BUCKET_NAME }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Output Website URL
        run: |
          echo "đźš€ Deployment complete!"
          echo "Website URL: https://${{ env.DOMAIN }}"
